<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="mb-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
    <linearGradient id="mb-gold-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="mb-glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#C9A96E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="mb-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="mb-soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="600" height="400" fill="#0A0A0A"/>
