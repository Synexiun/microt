<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="phi-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="phi-gold-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="phi-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="phi-blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#0A0A0A"/>
  <rect width="600" height="400" fill="url(#phi-glow)"/>
  <!-- Golden ratio spiral -->
  <g transform="translate(160, 80)" fill="none" stroke="url(#phi-gold)" opacity="0.7">
    <!-- Main Fibonacci spiral -->
    <path d="M170,200 A130,130 0 0,1 40,70" stroke-width="1.5"/>
    <path d="M40,70 A80,80 0 0,1 120,150" stroke-width="1.5"/>
    <path d="M120,150 A50,50 0 0,1 70,100" stroke-width="1.5"/>
    <path d="M70,100 A30,30 0 0,1 100,130" stroke-width="1.5"/>
    <path d="M100,130 A19,19 0 0,1 81,111" stroke-width="1.5"/>
    <path d="M81,111 A12,12 0 0,1 93,123" stroke-width="1.5"/>
    <!-- Phi symbol - elegant -->
    <g transform="translate(200, 60)" stroke-width="2">
      <ellipse cx="30" cy="50" rx="22" ry="35" opacity="0.8"/>
      <line x1="30" y1="5" x2="30" y2="95" opacity="0.8"/>
    </g>
    <!-- Golden ratio rectangles (faint) -->
    <rect x="40" y="70" width="130" height="130" stroke-width="0.5" opacity="0.3"/>
    <rect x="40" y="70" width="80" height="80" stroke-width="0.5" opacity="0.25"/>
    <rect x="70" y="100" width="50" height="50" stroke-width="0.4" opacity="0.2"/>
    <rect x="70" y="100" width="30" height="30" stroke-width="0.4" opacity="0.15"/>
  </g>
  <!-- Brow shape integrated with the spiral -->
  <g fill="none" stroke="url(#phi-gold)" stroke-linecap="round">
    <!-- Eyebrow following golden proportions -->
    <path d="M130,215 C170,178 230,160 310,158 C360,157 400,165 440,180 C465,190 480,202 478,212 C475,220 460,224 440,222 C390,218 320,214 260,218 C210,222 165,228 140,222 C132,220 128,218 130,215Z" stroke-width="1.8" opacity="0.65"/>
    <!-- Precision measurement lines -->
    <line x1="130" y1="195" x2="130" y2="240" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="310" y1="140" x2="310" y2="240" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="478" y1="195" x2="478" y2="240" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>
    <!-- Measurement arcs -->
    <path d="M130,240 L310,240" stroke-width="0.4" opacity="0.25"/>
    <path d="M310,240 L478,240" stroke-width="0.4" opacity="0.25"/>
    <!-- Small tick marks -->
    <line x1="130" y1="238" x2="130" y2="242" stroke-width="0.6" opacity="0.35"/>
    <line x1="310" y1="238" x2="310" y2="242" stroke-width="0.6" opacity="0.35"/>
    <line x1="478" y1="238" x2="478" y2="242" stroke-width="0.6" opacity="0.35"/>
  </g>
  <!-- 1.618 ratio text suggestion with lines -->
  <g stroke="#C9A96E" fill="#C9A96E" opacity="0.3">
    <text x="210" y="258" font-family="serif" font-size="10" fill="#C9A96E">1.618</text>
    <text x="385" y="258" font-family="serif" font-size="10" fill="#C9A96E">1.0</text>
  </g>
  <!-- Decorative precision dots -->
  <g fill="#D4AF37">
    <circle cx="130" cy="215" r="2" opacity="0.5"/>
    <circle cx="310" cy="158" r="2.5" opacity="0.6"/>
    <circle cx="478" cy="212" r="2" opacity="0.5"/>
  </g>
  <!-- Subtle grid pattern suggesting mathematical precision -->
  <g stroke="#C9A96E" stroke-width="0.2" opacity="0.08">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
  </g>
  <!-- Bottom decorative line -->
  <line x1="100" y1="340" x2="500" y2="340" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
</svg>