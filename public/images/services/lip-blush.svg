<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="lip-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
    <linearGradient id="lip-pink-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A0BF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#D4AF37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="lip-blush-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A0BF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8A0BF" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="lip-glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#E8A0BF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="lip-soft">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="lip-sparkle">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#0A0A0A"/>
  <rect width="600" height="400" fill="url(#lip-glow)"/>
  <!-- Soft blush glow behind lips -->
  <ellipse cx="300" cy="200" rx="150" ry="80" fill="#E8A0BF" opacity="0.06" filter="url(#lip-soft)"/>
  <ellipse cx="300" cy="200" rx="100" ry="50" fill="#D4AF37" opacity="0.04" filter="url(#lip-soft)"/>
  <!-- Upper lip -->
  <path d="M180,195 C200,185 230,175 260,178 C278,180 290,172 300,165 C310,172 322,180 340,178 C370,175 400,185 420,195" fill="url(#lip-blush-fill)" stroke="url(#lip-gold)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cupid's bow detail -->
  <path d="M260,178 C275,182 288,175 300,165 C312,175 325,182 340,178" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.7"/>
  <!-- Lower lip -->
  <path d="M180,195 C200,198 240,235 280,240 C295,241 305,241 320,240 C360,235 400,198 420,195" fill="url(#lip-blush-fill)" stroke="url(#lip-gold)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Inner lip line -->
  <path d="M190,195 C230,200 270,204 300,205 C330,204 370,200 410,195" fill="none" stroke="#E8A0BF" stroke-width="0.8" opacity="0.4"/>
  <!-- Lip color gradient fills -->
  <path d="M195,195 C215,188 240,180 265,180 C282,182 292,176 300,170 C308,176 318,182 335,180 C360,180 385,188 405,195 C385,198 350,225 320,232 C305,235 295,235 280,232 C250,225 215,198 195,195Z" fill="#E8A0BF" opacity="0.12"/>
  <path d="M220,195 C240,190 260,185 280,185 C290,186 295,182 300,178 C305,182 310,186 320,185 C340,185 360,190 380,195 C365,200 340,218 315,225 C305,227 295,227 285,225 C260,218 235,200 220,195Z" fill="#D4AF37" opacity="0.08"/>
  <!-- Sparkle effects -->
  <g filter="url(#lip-sparkle)">
    <circle cx="250" cy="185" r="2" fill="#D4AF37" opacity="0.6"/>
    <circle cx="300" cy="170" r="2.5" fill="#D4AF37" opacity="0.7"/>
    <circle cx="350" cy="185" r="2" fill="#D4AF37" opacity="0.6"/>
    <circle cx="275" cy="220" r="1.5" fill="#E8A0BF" opacity="0.5"/>
    <circle cx="325" cy="220" r="1.5" fill="#E8A0BF" opacity="0.5"/>
    <circle cx="300" cy="230" r="2" fill="#D4AF37" opacity="0.5"/>
  </g>
  <!-- Tiny sparkle dots -->
  <g fill="#D4AF37">
    <circle cx="235" cy="178" r="0.8" opacity="0.7"/>
    <circle cx="365" cy="178" r="0.8" opacity="0.7"/>
    <circle cx="220" cy="200" r="0.6" opacity="0.5"/>
    <circle cx="380" cy="200" r="0.6" opacity="0.5"/>
    <circle cx="290" cy="235" r="0.7" opacity="0.4"/>
    <circle cx="310" cy="235" r="0.7" opacity="0.4"/>
    <circle cx="260" cy="175" r="0.5" opacity="0.6"/>
    <circle cx="340" cy="175" r="0.5" opacity="0.6"/>
    <circle cx="300" cy="198" r="0.8" opacity="0.5"/>
  </g>
  <!-- Star sparkle accents -->
  <g stroke="#D4AF37" stroke-width="0.5" opacity="0.5">
    <line x1="248" y1="160" x2="252" y2="160"/>
    <line x1="250" y1="158" x2="250" y2="162"/>
    <line x1="348" y1="162" x2="352" y2="162"/>
    <line x1="350" y1="160" x2="350" y2="164"/>
    <line x1="198" y1="188" x2="202" y2="188"/>
    <line x1="200" y1="186" x2="200" y2="190"/>
    <line x1="398" y1="188" x2="402" y2="188"/>
    <line x1="400" y1="186" x2="400" y2="190"/>
  </g>
  <!-- Decorative elements -->
  <line x1="100" y1="330" x2="500" y2="330" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
  <circle cx="300" cy="330" r="2" fill="#E8A0BF" opacity="0.3"/>
  <circle cx="280" cy="330" r="1" fill="#D4AF37" opacity="0.2"/>
  <circle cx="320" cy="330" r="1" fill="#D4AF37" opacity="0.2"/>
</svg>