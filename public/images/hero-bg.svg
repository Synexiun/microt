<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="hero-center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#C9A96E" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hero-gold-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="hero-gold-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#C9A96E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="hero-gold-3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="hero-particle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="hero-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="hero-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="1920" height="1080" fill="#0A0A0A"/>
  <!-- Subtle dark gradient overlay -->
  <rect width="1920" height="1080" fill="url(#hero-center-glow)"/>
  <!-- Flowing wave 1 - large sweeping curve -->
  <path d="M-100,800 C200,750 400,500 700,520 C1000,540 1100,700 1400,600 C1700,500 1800,350 2020,400" fill="none" stroke="url(#hero-gold-1)" stroke-width="1.5" opacity="0.6"/>
  <path d="M-100,810 C200,760 400,510 700,530 C1000,550 1100,710 1400,610 C1700,510 1800,360 2020,410" fill="none" stroke="url(#hero-gold-1)" stroke-width="0.8" opacity="0.3"/>
  <!-- Flowing wave 2 -->
  <path d="M-50,600 C300,550 500,350 800,400 C1100,450 1200,600 1500,500 C1800,400 1900,250 2050,300" fill="none" stroke="url(#hero-gold-2)" stroke-width="1.2" opacity="0.5"/>
  <path d="M-50,615 C300,565 500,365 800,415 C1100,465 1200,615 1500,515 C1800,415 1900,265 2050,315" fill="none" stroke="url(#hero-gold-2)" stroke-width="0.6" opacity="0.25"/>
