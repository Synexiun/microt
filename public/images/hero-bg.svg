  <path d="M-100,450 Q500,250 960,490 Q1420,730 2020,430" fill="none" stroke="#D4AF37" stroke-width="0.3" opacity="0.15"/>
  <path d="M-100,550 Q400,400 960,580 Q1520,760 2020,520" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.18"/>
