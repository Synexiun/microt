<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="logo-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="40%" stop-color="#C9A96E"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
    <linearGradient id="logo-gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.1"/>
      <stop offset="20%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C9A96E" stop-opacity="1"/>
      <stop offset="80%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- VBS Monogram - elegant serif letterforms -->
  <!-- Letter V -->
  <path d="M20,15 L22,15 L40,52 L58,15 L60,15 L40.5,57 L39.5,57 Z" fill="url(#logo-gold)"/>
  <!-- Thin serif on V -->
  <path d="M17,15 L23,15 L22,17 L18,17 Z" fill="url(#logo-gold)" opacity="0.8"/>
  <path d="M57,15 L63,15 L62,17 L58,17 Z" fill="url(#logo-gold)" opacity="0.8"/>
  <!-- Letter B -->
  <path d="M72,15 L72,57 L74,57 L74,15 Z" fill="url(#logo-gold)"/>
  <!-- B upper bowl -->
  <path d="M74,15 L92,15 C100,15 105,19 105,25 C105,31 100,35 94,36 L74,36 L74,34 L93,34 C99,34 103,30 103,25 C103,20 99,17 93,17 L74,17 Z" fill="url(#logo-gold)"/>
  <!-- B lower bowl -->
  <path d="M74,36 L95,36 C103,36 108,40 108,47 C108,54 103,57 95,57 L74,57 L74,55 L94,55 C102,55 106,52 106,47 C106,42 102,38 94,38 L74,38 Z" fill="url(#logo-gold)"/>
  <!-- B serifs -->
  <path d="M69,15 L75,15 L75,17 L69,17 Z" fill="url(#logo-gold)" opacity="0.8"/>
  <path d="M69,55 L75,55 L75,57 L69,57 Z" fill="url(#logo-gold)" opacity="0.8"/>
  <!-- Letter S -->
  <path d="M135,20 C130,16 124,15 118,15 C112,15 107,18 107,23 C107,28 112,30 119,32 L126,34 C134,36 140,39 140,47 C140,54 134,58 125,58 C118,58 112,55 108,51 L110,49 C114,53 119,56 125,56 C132,56 138,53 138,47 C138,41 133,38 126,36 L119,34 C112,32 109,28 109,23 C109,17 114,13 120,13 C126,13 131,15 136,19 Z" fill="url(#logo-gold)"/>
  <!-- Decorative flourish line underneath -->
  <line x1="30" y1="65" x2="170" y2="65" stroke="url(#logo-gold-line)" stroke-width="1"/>
  <!-- Small decorative elements on the line -->
  <circle cx="100" cy="65" r="1.5" fill="#D4AF37" opacity="0.7"/>
  <path d="M90,65 L100,62 L110,65 L100,68 Z" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.5"/>
  <!-- Thin secondary line -->
  <line x1="50" y1="68" x2="150" y2="68" stroke="url(#logo-gold-line)" stroke-width="0.3" opacity="0.5"/>
</svg>