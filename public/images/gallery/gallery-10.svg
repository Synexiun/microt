<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g10-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="g10-champagne" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6CC" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="g10-glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#F5E6CC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <filter id="g10-blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#g10-glow)"/>
  <!-- Abstract geometric brow art - art deco style -->
  <!-- Geometric diamond pattern background -->
  <g stroke="#C9A96E" fill="none" opacity="0.08">
    <path d="M200,80 L280,200 L200,320 L120,200 Z"/>
    <path d="M200,120 L250,200 L200,280 L150,200 Z"/>
    <path d="M200,160 L220,200 L200,240 L180,200 Z"/>
  </g>
  <!-- Stylized brow with geometric flair -->
  <path d="M80,185 C120,155 180,140 240,138 C290,137 330,145 365,165 C375,172 374,180 368,185 C355,192 325,195 285,193 C235,190 175,193 125,198 C95,200 80,195 80,190Z" fill="url(#g10-champagne)" stroke="url(#g10-gold)" stroke-width="1.5" opacity="0.6"/>
  <!-- Geometric hair strokes - more angular/structured -->
  <g stroke="#D4AF37" fill="none" stroke-linecap="round">
    <path d="M100,194 L118,168" stroke-width="0.8" opacity="0.5"/>
    <path d="M125,196 L148,164" stroke-width="0.9" opacity="0.6"/>
    <path d="M150,196 L178,160" stroke-width="0.9" opacity="0.65"/>
    <path d="M175,195 L206,156" stroke-width="1" opacity="0.7"/>
    <path d="M200,194 L234,152" stroke-width="1" opacity="0.75"/>
    <path d="M225,193 L258,150" stroke-width="1" opacity="0.75"/>
    <path d="M250,192 L280,154" stroke-width="0.9" opacity="0.7"/>
    <path d="M275,192 L302,158" stroke-width="0.9" opacity="0.65"/>
    <path d="M300,192 L322,165" stroke-width="0.8" opacity="0.6"/>
    <path d="M325,192 L340,172" stroke-width="0.7" opacity="0.5"/>
    <path d="M345,190 L355,178" stroke-width="0.6" opacity="0.4"/>
  </g>
  <!-- Art deco sun rays from brow arch -->
  <g stroke="#D4AF37" fill="none" opacity="0.1">
    <line x1="240" y1="138" x2="240" y2="80"/>
    <line x1="200" y1="145" x2="185" y2="85"/>
    <line x1="280" y1="142" x2="295" y2="85"/>
    <line x1="160" y1="155" x2="135" y2="95"/>
    <line x1="320" y1="152" x2="345" y2="95"/>
  </g>
  <!-- Gold accent dots -->
  <g fill="#D4AF37" opacity="0.45">
    <circle cx="240" cy="80" r="2"/>
    <circle cx="185" cy="85" r="1.5"/>
    <circle cx="295" cy="85" r="1.5"/>
    <circle cx="135" cy="95" r="1.2"/>
    <circle cx="345" cy="95" r="1.2"/>
  </g>
  <!-- Frame with art deco corners -->
  <rect x="15" y="15" width="370" height="370" rx="2" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>
  <g fill="#D4AF37" opacity="0.35">
    <rect x="15" y="15" width="20" height="2" rx="1"/>
    <rect x="15" y="15" width="2" height="20" rx="1"/>
    <rect x="365" y="15" width="20" height="2" rx="1"/>
    <rect x="383" y="15" width="2" height="20" rx="1"/>
    <rect x="15" y="383" width="20" height="2" rx="1"/>
    <rect x="15" y="365" width="2" height="20" rx="1"/>
    <rect x="365" y="383" width="20" height="2" rx="1"/>
    <rect x="383" y="365" width="2" height="20" rx="1"/>
