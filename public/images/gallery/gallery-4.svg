    <path d="M350,165 C325,140 290,128 245,126 C215,125 195,132 180,145 C175,152 178,158 184,162 C200,168 230,170 260,168 C290,166 320,172 342,170 C348,168 352,167 350,165Z" stroke-width="1.2" opacity="0.5"/>
    <path d="M338,164 C332,154 320,146 305,140" stroke-width="0.8" opacity="0.6"/>
    <path d="M320,166 C314,154 300,142 282,134" stroke-width="0.9" opacity="0.7"/>
    <path d="M300,168 C294,154 278,140 258,132" stroke-width="0.9" opacity="0.75"/>
    <path d="M278,168 C272,154 256,138 236,130" stroke-width="1" opacity="0.8"/>
    <path d="M256,166 C252,154 240,140 222,134" stroke-width="0.9" opacity="0.7"/>
    <path d="M235,164 C232,154 224,144 210,140" stroke-width="0.8" opacity="0.6"/>
    <path d="M215,164 C214,156 208,148 200,145" stroke-width="0.7" opacity="0.5"/>
