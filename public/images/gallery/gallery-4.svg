<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g4-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="g4-champagne" x1="0%" y1="0%" x2="100%" y2="100%">
