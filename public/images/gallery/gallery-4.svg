  <!-- Nose bridge hint -->
  <path d="M195,180 C198,210 198,240 195,265" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.15"/>
  <path d="M205,180 C202,210 202,240 205,265" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.15"/>
