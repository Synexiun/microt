      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="g4-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#g4-glow)"/>
