<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pat-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>
  <!-- Art deco repeating pattern - subtle gold lines on transparent -->
  <!-- Diamond shape -->
  <path d="M50,5 L95,50 L50,95 L5,50 Z" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.08"/>
  <!-- Inner diamond -->
  <path d="M50,20 L80,50 L50,80 L20,50 Z" fill="none" stroke="#D4AF37" stroke-width="0.2" opacity="0.06"/>
  <!-- Fan/arch lines from corners -->
  <!-- Top corner -->
  <path d="M50,0 Q60,25 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <path d="M50,0 Q40,25 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <!-- Bottom corner -->
  <path d="M50,100 Q60,75 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <path d="M50,100 Q40,75 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <!-- Left corner -->
  <path d="M0,50 Q25,40 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <path d="M0,50 Q25,60 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <!-- Right corner -->
  <path d="M100,50 Q75,40 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <path d="M100,50 Q75,60 50,50" fill="none" stroke="#C9A96E" stroke-width="0.2" opacity="0.05"/>
  <!-- Small accent dots at intersections -->
  <circle cx="50" cy="50" r="1" fill="#D4AF37" opacity="0.06"/>
  <circle cx="50" cy="5" r="0.5" fill="#D4AF37" opacity="0.05"/>
  <circle cx="95" cy="50" r="0.5" fill="#D4AF37" opacity="0.05"/>
  <circle cx="50" cy="95" r="0.5" fill="#D4AF37" opacity="0.05"/>
  <circle cx="5" cy="50" r="0.5" fill="#D4AF37" opacity="0.05"/>
  <!-- Corner connecting arcs for seamless tiling -->
  <path d="M0,0 Q15,15 0,30" fill="none" stroke="#C9A96E" stroke-width="0.15" opacity="0.04"/>
  <path d="M100,0 Q85,15 100,30" fill="none" stroke="#C9A96E" stroke-width="0.15" opacity="0.04"/>
  <path d="M0,100 Q15,85 0,70" fill="none" stroke="#C9A96E" stroke-width="0.15" opacity="0.04"/>
  <path d="M100,100 Q85,85 100,70" fill="none" stroke="#C9A96E" stroke-width="0.15" opacity="0.04"/>
  <!-- Horizontal/vertical subtle lines -->
  <line x1="0" y1="50" x2="100" y2="50" stroke="#C9A96E" stroke-width="0.1" opacity="0.03"/>
  <line x1="50" y1="0" x2="50" y2="100" stroke="#C9A96E" stroke-width="0.1" opacity="0.03"/>
</svg>